<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaggar BPO - Brand Puzzle</title>
<style>
/* 1. CORE STYLES */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg,#eef3ff,#dce8ff);
    color: #333;
    text-align:center;
    overflow-x: hidden;
}

#headerLogo { margin: 20px 0 10px 0; }
#headerLogo img { width: 80px; height: 80px; }
#headerLogo h2 { margin: 8px 0 0 0; color: #1a3c6e; font-size: 20px; font-weight:700; }

h1 { margin: 10px 0 20px 0; color:#1a3c6e; font-size: 24px; }

/* 2. MENU & CONTROLS */
#menu { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:20px; padding: 0 10px; }
#menu button, #menu select {
    padding: 12px; border-radius:12px; border:1px solid #ccc; cursor:pointer; width:140px; font-weight:600; font-size: 14px;
}
#startBtn { background:#28a745; color:white; border:none; }
#startBtn:hover { background:#218838; }
#shuffleBtn { background:#1a73e8; color:white; border:none; }

/* 3. LAYOUT AREA */
#mainArea { 
    display:flex; 
    justify-content:center; 
    align-items: flex-start;
    gap:20px; 
    flex-wrap:wrap; 
    margin:10px; 
}

/* 4. PREVIEW PANEL */
#previewPanel {
    background:white; padding:15px; width:240px;
    border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,.1); text-align:center;
    order: 1;
}
#previewPanel h4 { margin: 0 0 10px 0; color: #1a3c6e; }
#preview { width:120px; height:120px; border-radius:8px; border:2px solid #ddd; margin-bottom:10px; }
.stat-box { margin:5px 0; font-weight:700; color:#1a3c6e; font-size: 15px; text-align: center; }

/* 5. PUZZLE BOARD - RESPONSIVE */
#boardWrapper {
    width: min(95vw, 400px);
    margin: 0 auto;
    order: 2;
}

#board {
    background:#b0bec5; 
    border-radius:8px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    overflow:hidden;
    width: 100%;
    aspect-ratio: 1 / 1;
    display: grid;
    gap: 1px; 
    touch-action: none;
    border: 2px solid #fff;
}

#board.winner-glow {
    box-shadow: 0 0 50px #ffd700;
    transform: scale(1.02);
    border: 4px solid #ffd700;
    gap: 0px; 
}

.piece {
    background-repeat: no-repeat;
    cursor: grab;
    box-sizing: border-box;
    outline: 0.5px solid rgba(255,255,255,0.1); 
}

/* 6. SERVICES PANEL */
#servicesPanel {
    width: 280px; padding:20px; background:white; border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.1); text-align:left;
    order: 3;
}
#servicesPanel h3 { font-size:18px; color:#1a3c6e; font-weight:700; margin-bottom:15px; }
.service-card {
    background:#1a3c6e; color:white; padding:12px; border-radius:12px;
    display:flex; align-items:center; gap:10px; cursor:pointer;
    transition: transform 0.2s; font-weight:500; margin-bottom:10px; font-size: 14px;
}
.service-card img { width:20px; height:20px; }
.service-card:hover { transform: scale(1.03); }

/* 7. WIN MODAL & CELEBRATION */
#winMessage {
    position: fixed; top:50%; left:50%; transform: translate(-50%,-50%);
    background:white; padding:40px; border-radius:20px; box-shadow:0 25px 70px rgba(0,0,0,.4);
    display:none; z-index:2000;
    border: 10px solid;
    border-image: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000) 1;
    animation: borderRotate 2s linear infinite, popup .4s ease-out forwards;
}

@keyframes borderRotate { 100% { filter: hue-rotate(360deg); } }
@keyframes popup { from{ transform:translate(-50%,-60%) scale(.7); opacity:0; } to{ transform:translate(-50%,-50%) scale(1); opacity:1; } }

.confetti {
    position: fixed; width: 12px; height: 12px; top: -20px; z-index: 1500;
    animation: fall 3.5s ease-in-out forwards;
}
@keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

/* MOBILE ADAPTATION */
@media(max-width:850px){
    #mainArea { flex-direction: column; align-items:center; }
    #previewPanel, #servicesPanel { width: 90vw; box-sizing: border-box; }
    #preview { width: 80px; height: 80px; }
    .stat-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
}
</style>
</head>
<body>

<div id="headerLogo">
    <img src="https://www.shaggarbpo.com/wp-content/uploads/2026/01/cropped-Icon_only_primary.png" alt="Shaggar BPO Logo">
    <h2>Shaggar BPO</h2>
</div>

<h1>Brand Master Puzzle</h1>

<div id="menu">
    <button id="startBtn" onclick="startGame()">Start Game</button>
    <button id="shuffleBtn" onclick="shufflePieces()">Shuffle</button>
    <select id="difficulty" onchange="createPieces()">
        <option value="3">Easy 3×3</option>
        <option value="4" selected>Medium 4×4</option>
        <option value="5">Hard 5×5</option>
    </select>
</div>

<div id="mainArea">
    <div id="previewPanel">
        <h4>Goal</h4>
        <img id="preview" src="https://www.shaggarbpo.com/wp-content/uploads/2026/01/cropped-Icon_only_primary.png">
        <div class="stat-container">
            <div class="stat-box" id="timer">⏱ 0s</div>
            <div class="stat-box" id="moves">🧩 0 Moves</div>
            <div class="stat-box" id="score">⭐ 0</div>
            <div class="stat-box" id="best">🏆 Best: 0</div>
        </div>
    </div>

    <div id="boardWrapper">
        <div id="board"></div>
    </div>

    <div id="servicesPanel">
        <h3>Our Services</h3>
        <div class="service-card" onclick="showService('Software & Web Development')"><img src="https://img.icons8.com/ios-filled/50/ffffff/source-code.png"/> Software Dev</div>
        <div class="service-card" onclick="showService('Customer Support Experts')"><img src="https://img.icons8.com/ios-filled/50/ffffff/customer-support.png"/> CX Partner</div>
        <div class="service-card" onclick="showService('Strategic Branding')"><img src="https://img.icons8.com/ios-filled/50/ffffff/idea.png"/> Brand Dev</div>
        <div class="service-card" onclick="showService('Digital Marketing')"><img src="https://img.icons8.com/ios-filled/50/ffffff/marketing.png"/> Marketing</div>
        <div class="service-card" onclick="showService('Sales Strategy')"><img src="https://img.icons8.com/ios-filled/50/ffffff/sales-performance.png"/> Sales Strategy</div>
    </div>
</div>

<div id="winMessage">
    <h2>🏆 PUZZLE MASTER! 🏆</h2>
    <p style="font-size: 18px; font-weight: bold; color: #1a3c6e;">Incredible work!</p>
    <div id="finalStats" style="margin: 20px 0; font-size: 18px; font-weight: bold;"></div>
    <button onclick="startGame()" style="padding: 12px 25px; border:none; border-radius:8px; background:#28a745; color:white; font-weight:bold; cursor:pointer; font-size: 16px;">Play Again</button>
</div>

<div id="serviceModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; border-radius:12px; box-shadow:0 15px 50px rgba(0,0,0,.3); z-index:1000; width: 80%; max-width: 400px;">
    <p id="serviceText" style="margin:0; font-weight:500;"></p>
    <button onclick="document.getElementById('serviceModal').style.display='none'" style="margin-top:15px; padding:8px 15px; border:none; border-radius:6px; background:#1a73e8; color:white; cursor:pointer;">Close</button>
</div>

<script>
const BRAND_IMAGE = "https://www.shaggarbpo.com/wp-content/uploads/2026/01/cropped-Icon_only_primary.png";
let size=4, board=document.getElementById("board");
let moves=0, time=0, score=0, timer=null, dragged=null;
let bestScore=localStorage.getItem("bestScore")||0;
let isPlaying = false;

function getBoardSize() { return board.clientWidth; }

function startGame(){ 
    isPlaying = true;
    document.getElementById("winMessage").style.display="none"; 
    board.classList.remove("winner-glow");
    size=parseInt(document.getElementById("difficulty").value); 
    moves=time=score=0; 
    clearInterval(timer); 
    timer=setInterval(()=>{ if(isPlaying){ time++; updatePanel(); } },1000); 
    createPieces(); 
    shufflePieces(); 
    updatePanel();
}

function createPieces(){ 
    board.innerHTML=""; 
    size=parseInt(document.getElementById("difficulty").value); 
    board.style.gridTemplateColumns=`repeat(${size},1fr)`; 
    
    const totalPixels = getBoardSize();
    const pSize = totalPixels / size; 
    
    for(let i=0; i < (size*size); i++){ 
        let r = Math.floor(i/size);
        let c = i % size;
        let p=document.createElement("div"); 
        p.className="piece"; 
        p.style.backgroundImage=`url(${BRAND_IMAGE})`; 
        p.style.backgroundSize=`${totalPixels}px ${totalPixels}px`; 
        p.style.backgroundPosition = `${-(c * pSize)}px ${-(r * pSize)}px`;
        p.dataset.correctIndex = i; 
        p.draggable=true; 
        
        p.addEventListener("dragstart",()=>dragged=p); 
        p.addEventListener("dragover",e=>e.preventDefault()); 
        p.addEventListener("drop",()=>swap(p)); 
        
        p.addEventListener("touchstart",(e)=>{ dragged=p; }, {passive: true}); 
        p.addEventListener("touchend",e=>{
            let t=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
            if(t && t.className==='piece') swap(t);
        });
        board.appendChild(p);
    }
}

function shufflePieces(){ 
    let pieces=Array.from(board.children); 
    for (let i = pieces.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        board.appendChild(pieces[j]); 
    }
    if(checkWinStatus()) shufflePieces();
    moves=0; updatePanel();
}

function swap(target){ 
    if(!dragged || dragged === target || !isPlaying) return; 
    let pieces = Array.from(board.children);
    let i = pieces.indexOf(dragged);
    let j = pieces.indexOf(target);
    let tempNode = document.createElement("div");
    board.insertBefore(tempNode, dragged);
    board.insertBefore(dragged, target);
    board.insertBefore(target, tempNode);
    tempNode.remove();
    moves++; calculateScore(); updatePanel(); checkWin(); 
    new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3").play().catch(()=>{});
}

function checkWinStatus() {
    let pieces = Array.from(board.children);
    return pieces.every((p, index) => parseInt(p.dataset.correctIndex) === index);
}

function checkWin(){ 
    if(checkWinStatus()){ 
        isPlaying = false; clearInterval(timer); 
        board.classList.add("winner-glow");
        launchConfetti();
        if(score>bestScore){ bestScore=score; localStorage.setItem("bestScore",score); }
        document.getElementById("finalStats").innerHTML = `🏆 Score: ${score}<br>⏱ Time: ${time}s<br>🧩 Moves: ${moves}`; 
        document.getElementById("winMessage").style.display="block";
        new Audio("https://assets.mixkit.co/active_storage/sfx/2764/2764-preview.mp3").play().catch(()=>{});
    }
}

function calculateScore(){ score=Math.max(0,(size*size*250)-(moves*12+time)); }
function updatePanel(){ 
    document.getElementById("timer").innerHTML=`⏱ ${time}s`; 
    document.getElementById("moves").innerHTML=`🧩 ${moves} Moves`; 
    document.getElementById("score").innerHTML=`⭐ ${score}`; 
    document.getElementById("best").innerHTML=`🏆 Best: ${bestScore}`;
}

function launchConfetti(){ 
    for(let i=0;i<100;i++){ 
        let c=document.createElement("div"); c.className="confetti"; 
        c.style.left=Math.random()*100+"vw"; c.style.background=`hsl(${Math.random()*360},80%,60%)`; 
        c.style.animationDuration=(2+Math.random()*2)+"s"; document.body.appendChild(c); 
        setTimeout(()=>c.remove(),4000); 
    } 
}

function showService(t){ 
    document.getElementById("serviceText").innerText=t; 
    document.getElementById("serviceModal").style.display="block"; 
}

window.addEventListener('resize', () => { if(isPlaying) createPieces(); });

createPieces();
updatePanel();
</script>
</body>
</html>
